[package]
name = "collapsescanner"
version = "1.0.0"
edition = "2021"
authors = ["dest4590", "github copilot", "google gemini"]

[dependencies]
eframe = "0.29.1"
egui = { version = "0.29.1", features = ["serde"] }
colored = "2.1.0"
regex = "1.11.1"
zip = "2.2.0"

[profile.release]
codegen-units = 1
opt-level = "z"
panic = "abort"
strip = true
lto = true